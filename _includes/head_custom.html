<style>
/* Clean dark theme - programmer style */

:root {
  --accent: #7c8aff;
  --bg: #111318;
  --bg-sidebar: #0e1015;
  --border: #1c1f26;
  --text: #c9cdd5;
  --text-dim: #5c6370;
  --code-bg: #161920;
}

body, .main-content-wrap {
  background: var(--bg) !important;
}

.side-bar {
  background: var(--bg-sidebar) !important;
  border-right: 1px solid var(--border) !important;
}

.site-title {
  color: var(--text) !important;
  font-weight: 700 !important;
  letter-spacing: -0.3px;
}

/* nav */
.nav-list .nav-list-item .nav-list-link {
  color: var(--text-dim) !important;
  transition: color 0.15s;
}
.nav-list .nav-list-item .nav-list-link:hover {
  color: var(--text) !important;
  background: rgba(255,255,255,0.03) !important;
}
.nav-list .nav-list-item .nav-list-link.active {
  color: var(--accent) !important;
  font-weight: 600;
  background: transparent !important;
}

/* content */
.main-content h1 { color: var(--text) !important; font-weight: 700; }
.main-content h2 { color: var(--text) !important; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.main-content h3 { color: var(--text) !important; }
.main-content strong { color: #e1e4ea; }

.main-content a:not(.site-title):not(.nav-list-link):not(.btn):not(.back-to-top) {
  color: var(--accent) !important;
  text-decoration: none;
}
.main-content a:not(.site-title):not(.nav-list-link):not(.btn):not(.back-to-top):hover {
  text-decoration: underline;
}

/* inline code */
.main-content code {
  background: var(--code-bg) !important;
  color: #abb2bf !important;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 0.87em;
}

/* code blocks */
.main-content pre {
  background: var(--code-bg) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
}
.main-content pre code {
  background: transparent !important;
  border: none !important;
  color: var(--text) !important;
  padding: 0;
}

/* table */
.main-content table th {
  background: rgba(255,255,255,0.04) !important;
  color: var(--text) !important;
  border-bottom: 1px solid var(--border) !important;
}
.main-content table td { border-color: var(--border) !important; }
.main-content table tr { background: transparent !important; }
.main-content table tr:hover { background: rgba(255,255,255,0.02) !important; }

/* search */
.search-input {
  background: var(--code-bg) !important;
  border: 1px solid var(--border) !important;
  color: var(--text) !important;
  border-radius: 6px !important;
}
.search-input:focus {
  border-color: var(--accent) !important;
  box-shadow: none !important;
}

/* blockquote */
.main-content blockquote {
  border-left: 2px solid var(--border) !important;
  color: var(--text-dim);
  background: transparent;
}

/* hr */
.main-content hr { border-color: var(--border) !important; }

/* footer */
.site-footer {
  border-top: 1px solid var(--border) !important;
  color: var(--text-dim) !important;
}
.site-footer a { color: var(--accent) !important; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* selection */
::selection { background: rgba(124,138,255,0.25); color: #fff; }
</style>
