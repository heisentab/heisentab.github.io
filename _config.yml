title: Go 语言学习笔记
description: A Web3 Builder's Go Learning Notes
baseurl: ""
url: "https://heisentab.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

aux_links:
  "GitHub":
    - "https://github.com/heisentab"

nav_sort: case_insensitive
heading_anchors: true
back_to_top: true
back_to_top_text: "Top"

search_enabled: true
search:
  heading_level: 3

callouts:
  note:
    title: Note
    color: yellow

footer_content: "Go 语言学习笔记 &copy; 2025-2026 | <a href=\"https://golang-china.github.io/gopl-zh/\">Go 语言圣经</a>"

plugins:
  - jekyll-remote-theme

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
